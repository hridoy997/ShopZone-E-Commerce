<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            background: #f8f9fa;
            font-family: Arial, Helvetica, sans-serif;
        }

        .card {
            border-radius: 10px;
        }

        .card-header {
            border-radius: 10px 10px 0 0 !important;
        }

        footer {
            margin-top: 60px;
        }
    </style>

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">

            <a class="navbar-brand" href="index.html">ShopZone</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="products.html">Products</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="product-details.html">Product Details</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="signup.html">Signup</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="login.html">Login</a>
                    </li>

                </ul>

            </div>

        </div>
    </nav>

    <!-- Breadcrumb -->

    <div class="container mt-4">

        <nav>
            <ol class="breadcrumb">
                <li class="breadcrumb-item">
                    <a href="index.html">Home</a>
                </li>

                <li class="breadcrumb-item active">
                    Login
                </li>
            </ol>
        </nav>

    </div>

    <!-- Login Form -->

    <div class="container my-5">

        <div class="row justify-content-center">

            <div class="col-md-5">

                <div class="card shadow">

                    <div class="card-header bg-primary text-white text-center">
                        <h3>User Login</h3>
                    </div>

                    <div class="card-body">

                        <form onsubmit="return loginConfirm()">

                            <div class="mb-3">
                                <label class="form-label">User Name</label>
                                <input type="text" class="form-control" placeholder="Enter User Name" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" placeholder="Enter Password" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Login
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- ================= FOOTER ================= -->

    <footer class="bg-dark text-white text-center py-4">

        <h5>ShopZone E-Commerce</h5>

        <p>Email : info@shopzone.com</p>

        <p>Phone : +880123456789</p>

        <p id="clock"></p>

        <p class="mb-0">
            © 2026 All Rights Reserved.
        </p>

    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Clock Script -->
    <script src="Js/script.js"></script>

    <!-- JavaScript -->
    <script>
        function loginConfirm() {

            return confirm("Are you sure you want to login?");
        }
    </script>

</body>

</html>
